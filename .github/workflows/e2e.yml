name: E2E Tests

on:
  push:
    branches:
      - master
      - main
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches:
      - master
      - main
      - develop
    paths:
      - 'frontend/**'

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/e2e_placeholder
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: e2e-test-secret-min-32-characters-long
      GOOGLE_CLIENT_ID: e2e-test-client-id
      GOOGLE_CLIENT_SECRET: e2e-test-client-secret
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Generate Prisma Client
        run: npm run build

      - name: Run E2E tests
        run: npm run e2e
        env:
          CI: true
          NODE_ENV: test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ./frontend/playwright-report/
          retention-days: 30

  accessibility:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/e2e_placeholder
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: e2e-test-secret-min-32-characters-long
      GOOGLE_CLIENT_ID: e2e-test-client-id
      GOOGLE_CLIENT_SECRET: e2e-test-client-secret
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Generate Prisma Client
        run: npm run build

      - name: Run accessibility tests
        run: npx playwright test e2e/auth-and-resume.spec.ts -g "accessibility"
        env:
          CI: true
          NODE_ENV: test

      - name: Upload Accessibility Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-report
          path: ./frontend/playwright-report/
          retention-days: 30
