name: Backend Tests

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  pytest:
    name: pytest (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    env:
      GOOGLE_CLIENT_ID: test-client-id
      GOOGLE_CLIENT_SECRET: test-client-secret
      OPENAI_API_KEY: test-openai-key
      CLAUDE_API_KEY: test-claude-key
      JWT_SECRET: test-jwt-secret-key-min-32-characters-long
      REFRESH_TOKEN_ENCRYPTION_KEY: test-encryption-key-min-32-chars

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: './backend/requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v

      - name: Verify FastAPI app imports cleanly
        run: python -c "from app.main import app; print(f'routes: {len(app.routes)}')"
